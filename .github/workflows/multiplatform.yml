name: Multiplatform Validation

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    env:
      KIVY_WINDOW: mock
      KIVY_NO_ARGS: "1"
      KIVY_NO_CONSOLELOG: "1"
      PYTHONPATH: src
      BATLLM_RUN_OLLAMA_SMOKE: "0"

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip

      - name: Install dependencies (requirements)
        run: python -m pip install -r requirements.txt

      - name: Compile launchers and source
        run: python -m compileall -q src run_batllm.py run_tests.py create_release_bundles.py create_homebrew_formula.py

      - name: Run non-live test suite
        run: python -m pytest -q src/tests --ignore=src/tests/test_homebrew_packaging.py

      - name: Build release bundles
        run: python create_release_bundles.py --version 0.0.0-ci

  homebrew:
    name: "Homebrew dry-run"
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip

      - name: Install dependencies (requirements)
        run: python -m pip install -r requirements.txt

      - name: Render Homebrew formula from current worktree
        run: >
          python create_homebrew_formula.py
          --create-worktree-archive /tmp/BatLLM-homebrew-source.tar.gz
          --formula-out /tmp/batllm.rb

      - name: Run Homebrew packaging tests
        run: python -m pytest -q src/tests/test_homebrew_packaging.py

  smoke:
    name: "Smoke: Ollama integration"
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 30
    env:
      KIVY_WINDOW: mock
      KIVY_NO_ARGS: "1"
      KIVY_NO_CONSOLELOG: "1"
      PYTHONPATH: src
      BATLLM_RUN_OLLAMA_SMOKE: "1"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip

      - name: Install dependencies (requirements)
        run: python -m pip install -r requirements.txt

      - name: Start mock Ollama and run smoke tests
        run: |
          set -euo pipefail
          python tools/ollama_mock_server.py --port 11434 &
          PID=$!
          echo "waiting for mock server ($PID)"
          n=0
          until curl -sS http://127.0.0.1:11434/api/version >/dev/null 2>&1 || [ $n -ge 15 ]; do
            sleep 1
            n=$((n+1))
          done
          curl -sS http://127.0.0.1:11434/api/version
          python -m pytest -q src/tests/smoke_llm_payload.py
          RC=$?
          kill $PID || true
          exit $RC
