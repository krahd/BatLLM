name: Multiplatform Validation

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
        with_modelito:
          - false
          - true

    env:
      KIVY_WINDOW: mock
      KIVY_NO_ARGS: "1"
      KIVY_NO_CONSOLELOG: "1"
      PYTHONPATH: src
      BATLLM_RUN_OLLAMA_SMOKE: "0"

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Cache pip
        if: matrix.os != 'windows-latest'
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: python -m pip install --upgrade pip

      - name: Install dependencies (requirements)
        run: python -m pip install -r requirements.txt

      - name: Install optional modelito
        if: matrix.with_modelito == true
        run: python -m pip install modelito==1.0.7

      - name: Compile launchers and source
        run: python -m compileall -q src run_batllm.py run_tests.py create_release_bundles.py

      - name: Run non-live test suite
        run: >
          python -m pytest -q
          src/tests/test_history_compact.py
          src/tests/test_close_prompt_behavior.py
          src/tests/test_utils_confirmation_dialog.py
          src/tests/test_ollama_config_screen.py
          src/tests/test_ollama_config_screen_logic.py
          src/tests/test_multiplatform_support.py

      - name: Build release bundles
        run: python create_release_bundles.py --version 0.0.0-ci

  smoke:
    name: "Smoke: Ollama integration"
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 30
    env:
      KIVY_WINDOW: mock
      KIVY_NO_ARGS: "1"
      KIVY_NO_CONSOLELOG: "1"
      PYTHONPATH: src
      BATLLM_RUN_OLLAMA_SMOKE: "1"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: python -m pip install --upgrade pip

      - name: Install dependencies (requirements)
        run: python -m pip install -r requirements.txt

      - name: Start mock Ollama and run smoke tests
        run: |
          set -euo pipefail
          python tools/ollama_mock_server.py --port 11434 &
          PID=$!
          echo "waiting for mock server ($PID)"
          n=0
          until curl -sS http://127.0.0.1:11434/api/version >/dev/null 2>&1 || [ $n -ge 15 ]; do
            sleep 1
            n=$((n+1))
          done
          curl -sS http://127.0.0.1:11434/api/version
          python -m pytest -q src/tests/smoke_llm_payload.py
          RC=$?
          kill $PID || true
          exit $RC
