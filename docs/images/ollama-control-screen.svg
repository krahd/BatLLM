<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">BatLLM Ollama control screen diagram</title>
  <desc id="desc">Illustrated overview of the Ollama configuration screen with status, output log, local models, and remote models.</desc>
  <rect width="1200" height="720" fill="#f4f1ea"/>
  <rect x="40" y="40" width="1120" height="640" rx="28" fill="#ffffff" stroke="#d7d0c3" stroke-width="4"/>
  <text x="90" y="110" font-family="Georgia, serif" font-size="42" fill="#181716">Ollama Configuration</text>
  <text x="92" y="148" font-family="Georgia, serif" font-size="20" fill="#55606a">Start, stop, inspect, and manage the models BatLLM uses.</text>

  <rect x="88" y="178" width="180" height="52" rx="14" fill="#8ab2c9"/>
  <rect x="286" y="178" width="180" height="52" rx="14" fill="#e6a9b5"/>
  <rect x="484" y="178" width="180" height="52" rx="14" fill="#d5d5d5"/>
  <text x="125" y="212" font-family="Arial, sans-serif" font-size="22" fill="#ffffff">Start Ollama</text>
  <text x="326" y="212" font-family="Arial, sans-serif" font-size="22" fill="#ffffff">Stop Ollama</text>
  <text x="539" y="212" font-family="Arial, sans-serif" font-size="22" fill="#ffffff">Refresh</text>

  <rect x="88" y="258" width="1024" height="122" rx="20" fill="#f8fbfd" stroke="#d3dfeb" stroke-width="3"/>
  <text x="114" y="302" font-family="Georgia, serif" font-size="28" fill="#1f3e57">Ollama Status</text>
  <text x="116" y="340" font-family="Arial, sans-serif" font-size="22" fill="#27323a">Installed version, server status, running models, and configured BatLLM model.</text>

  <rect x="88" y="402" width="1024" height="166" rx="20" fill="#0e0e0e"/>
  <text x="114" y="438" font-family="Georgia, serif" font-size="28" fill="#ffffff">Output</text>
  <text x="116" y="476" font-family="Courier New, monospace" font-size="20" fill="#ffffff">[20:12:01] GET /api/version</text>
  <text x="116" y="506" font-family="Courier New, monospace" font-size="20" fill="#ffffff">[20:12:02] Loaded local models: qwen3:30b, mistral-small:latest</text>
  <text x="116" y="536" font-family="Courier New, monospace" font-size="20" fill="#ffffff">[20:12:08] Loaded 2 remote models</text>

  <rect x="88" y="590" width="496" height="58" rx="18" fill="#f8fbfd" stroke="#d7d0c3" stroke-width="3"/>
  <text x="112" y="626" font-family="Georgia, serif" font-size="24" fill="#181716">Local Models</text>
  <rect x="276" y="602" width="170" height="34" rx="10" fill="#efefef"/>
  <text x="294" y="625" font-family="Arial, sans-serif" font-size="18" fill="#181716">Select local model</text>
  <rect x="460" y="602" width="104" height="34" rx="10" fill="#8ab2c9"/>
  <text x="474" y="625" font-family="Arial, sans-serif" font-size="18" fill="#ffffff">Use Selected</text>

  <rect x="616" y="590" width="496" height="58" rx="18" fill="#f8fbfd" stroke="#d7d0c3" stroke-width="3"/>
  <text x="640" y="626" font-family="Georgia, serif" font-size="24" fill="#181716">Remote Models</text>
  <rect x="838" y="602" width="170" height="34" rx="10" fill="#efefef"/>
  <text x="849" y="625" font-family="Arial, sans-serif" font-size="18" fill="#181716">Select remote model</text>
  <rect x="1024" y="602" width="72" height="34" rx="10" fill="#8ab2c9"/>
  <text x="1033" y="625" font-family="Arial, sans-serif" font-size="18" fill="#ffffff">Download</text>
</svg>
