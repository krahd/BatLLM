<svg xmlns="http://www.w3.org/2000/svg" width="900" height="760" viewBox="0 0 900 760" role="img" aria-labelledby="title desc">
  <title id="title">Remote model picker diagram</title>
  <desc id="desc">Illustration of the remote-model popup showing remote model names with sizes and modal close behavior.</desc>
  <rect width="900" height="760" fill="#ebe7df"/>
  <rect x="60" y="56" width="780" height="648" rx="28" fill="#ffffff" stroke="#cfc7b9" stroke-width="4"/>
  <text x="110" y="122" font-family="Georgia, serif" font-size="40" fill="#181716">Remote Models</text>
  <text x="112" y="158" font-family="Arial, sans-serif" font-size="20" fill="#59616a">Populated from https://ollama.com/library before the popup opens.</text>

  <rect x="110" y="194" width="680" height="380" rx="18" fill="#f6f8fb" stroke="#d6deea" stroke-width="3"/>

  <rect x="138" y="226" width="624" height="72" fill="#385f8a"/>
  <text x="172" y="271" font-family="Arial, sans-serif" font-size="26" fill="#ffffff">all-minilm (22m)</text>
  <text x="603" y="271" font-family="Arial, sans-serif" font-size="20" fill="#d8e7f2">selected</text>

  <rect x="138" y="298" width="624" height="72" fill="#1f1f1f"/>
  <text x="172" y="343" font-family="Arial, sans-serif" font-size="26" fill="#ffffff">smollm2 (135m)</text>

  <rect x="138" y="370" width="624" height="72" fill="#1f1f1f"/>
  <text x="172" y="415" font-family="Arial, sans-serif" font-size="26" fill="#ffffff">qwen3 (30b)</text>

  <rect x="138" y="442" width="624" height="72" fill="#1f1f1f"/>
  <text x="172" y="487" font-family="Arial, sans-serif" font-size="26" fill="#ffffff">gemma3 (12b)</text>

  <text x="112" y="618" font-family="Arial, sans-serif" font-size="21" fill="#181716">Choose a remote model here, then confirm with Download Selected on the screen.</text>
  <rect x="606" y="624" width="156" height="48" rx="14" fill="#dadada"/>
  <text x="655" y="655" font-family="Arial, sans-serif" font-size="24" fill="#181716">Close</text>
</svg>
